name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  GIT_COMMIT: ${{ github.sha }}
  GIT_REF: ${{ github.ref }}
  GIT_BRANCH: ${{ github.head_ref || github.ref_name }}
  LOG_LEVEL: info
  PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
  PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
  STABLE_NODE_VERSION: 22

jobs:
  complete:
    name: Test completion check
    if: always()

    permissions:
      contents: none

    runs-on: ubuntu-latest
    needs:
      - test-x86
      - test-alpine
      - test-arm64
      - lint
      - format
      - examples
      - regression

    steps:
      - name: Failed
        run: exit 1
        if: >
          contains(needs.*.result, 'failure')
          || contains(needs.*.result, 'cancelled')
          || contains(needs.*.result, 'skipped')

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.JS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.JS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format
        run: npm run format

  regression:
    name: Run regression suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.STABLE_NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm ci
        working-directory: regression
      - run: npm run test
        working-directory: regression

  test-x86:
    name: >-
      Test x86_64
      on ${{ startsWith(matrix.os, 'macos-') && 'macOS' || startsWith(matrix.os, 'windows-') && 'Windows' || 'Linux' }}
      with Node ${{ matrix.node-version }}

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
        os:
          - macos-15-intel
          - macos-latest
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Set NodeJS scripts shell
        if: startsWith(matrix.os, 'windows')
        run: npm config set script-shell "C:\\Program Files\\git\\bin\\bash.exe"

      - name: Install dependencies
        run: |
          npm ci

      - name: Run tests
        run: npm test

      - name: Coverage
        if: startsWith(matrix.os, 'ubuntu-')
        run: npm run coverage

      - name: Codecov
        if: startsWith(matrix.os, 'ubuntu-')
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6

  test-alpine:
    name: >-
      Test Alpine
      on ${{ startsWith(matrix.os, 'macos-') && 'macOS' || startsWith(matrix.os, 'windows-') && 'Windows' || 'Linux' }}
      with Node ${{ matrix.node-version }}

    runs-on: ubuntu-latest
    container:
      image: node:${{ matrix.node-version }}-alpine

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: [20, 22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install dependencies
        run: |
          npm ci

      - name: Run tests
        run: npm test

  test-arm64:
    name: >-
      Test ARM64
      on ${{ startsWith(matrix.os, 'macos-') && 'macOS' || startsWith(matrix.os, 'windows-') && 'Windows' || 'Linux' }}
      with Node ${{ matrix.node-version }}

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
        os:
          - ubuntu-24.04-arm
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js ${{ matrix.node-version }}
        if: startsWith(matrix.os, 'macos-')
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        if: startsWith(matrix.os, 'macos-')
        run: |
          npm ci

      - name: Test
        if: startsWith(matrix.os, 'macos-')
        run: |
          npm test

      - name: Install dependencies and test ubuntu (linux glibc)
        if: startsWith(matrix.os, 'ubuntu-')
        run: npm ci && npm test

      - name: Install dependencies and test alpine (linux musl)
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          docker run \
            --rm \
            -v $(pwd):/${{ github.workspace }} \
            -w /${{ github.workspace }} \
            --platform linux/arm64 \
            node:${{ matrix.node-version }}-alpine \
            sh -c "npm ci && npm test"

  examples:
    name: Test Examples
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.STABLE_NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run install-plugins
      - name: Install and test examples
        run: |
          error_file=$(mktemp)
          find examples \
            -maxdepth 2 \
            -name package.json \
            -not -path '*/node_modules/*' \
            -print0 | while IFS= read -r -d '' dir; do
            pushd "$(dirname "$dir")" > /dev/null
            echo "::group::$PWD"
            if ! npm ci; then
              echo "npm ci failed in $PWD" >> "$error_file"
            fi
            if ! npm run test; then
              echo "npm run test failed in $PWD" >> "$error_file"
            fi
            echo "::endgroup::"
            popd > /dev/null
          done
          if [ -s "$error_file" ]; then
            echo "::error::Examples test failures occurred"
            while IFS= read -r line; do
              echo "::error::$line"
            done < "$error_file"
            rm "$error_file"
            exit 1
          fi
